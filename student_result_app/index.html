<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Result App</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #e3f2fd, #fce4ec);
        padding: 40px;
        display: flex;
        justify-content: center;
      }
      .container {
        max-width: 420px;
        width: 90%;
        background: #ffffff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }
      h2 {
        text-align: center;
        margin-bottom: 20px;
      }
      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
      }
      #addBtn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #1976d2;
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 15px;
      }
      #addBtn:hover {
        background: #1565c0;
      }
      .buttons {
        display: flex;
        gap: 8px;
        margin-bottom: 15px;
        flex-wrap: wrap;
      }
      .buttons button {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        color: white;
      }
      .all {
        background: #9e9e9e;
      }
      .pass {
        background: #2e7d32;
      }
      .fail {
        background: #c62828;
      }
      .topper {
        background: #070202;
      }
      .Total {
        background: #690a0a;
      }
      .average {
        background: #93a100;
      }
      .sort {
        background: #a10058;
      }
      ul {
        list-style: none;
        padding: 0;
        margin-top: 10px;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        margin-bottom: 6px;
        border-radius: 6px;
        background: #f1f1f1;
        font-size: 14px;
      }
      li button {
        width: 40px;
      }
      @media (max-width: 480px) {
        body {
          padding: 20px;
        }
        input,
        button {
          font-size: 12px;
          padding: 8px;
        }
        li {
          font-size: 12px;
          padding: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Student Result App</h2>
      <input type="text" id="nameInput" placeholder="Student Name" />
      <input type="number" id="marksInput" placeholder="Marks (0 - 100)" />
      <button id="addBtn">Add Student</button>
      <input type="text" placeholder="Search by name" id="SearchBtn" />
      <div class="buttons">
        <button class="all">All</button>
        <button class="pass">Passed</button>
        <button class="fail">Failed</button>
        <button class="topper">Topper</button>
        <button class="Total">TotalMarks</button>
        <button class="average">AverageMarks</button>
        <button class="sort">Sort by Marks</button>
      </div>
      <ul id="studentList"></ul>
    </div>
  </body>
  <script src="script.js"></script>
</html>
